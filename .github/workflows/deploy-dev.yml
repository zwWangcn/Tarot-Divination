name: Deploy Dev to Google Cloud Run

on:
  push:
    branches:
      - dev

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }} # Google Cloud Project ID
  REGION: ${{ secrets.GCP_REGION || 'asia-northeast1' }} # Default region, e.g., us-central1 or asia-northeast1
  SERVICE_NAME: tarot-app-dev # Name of your development Cloud Run service
  GAR_LOCATION: ${{ secrets.GCP_GAR_LOCATION || 'asia-northeast1' }} # Artifact Registry location

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Google Cloud Authentication
      # Option 1: Authenticate via Service Account Key (Simple & Common)
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup Cloud SDK
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Authenticate Docker to Artifact Registry
      # This assumes you have created an Artifact Registry repository named 'cloud-run-source-deploy'
      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # Build and Push Docker Image to Artifact Registry
      - name: Build and Push Container
        run: |
          IMAGE_TAG="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # Deploy to Google Cloud Run (dev environment)
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_TAG }}
          flags: |
            --allow-unauthenticated
            --port=3000
          # If your app requires the Gemini API key, make sure it is configured as an environment variable in Cloud Run,
          # or mapped via Secret Manager in Google Cloud console.
